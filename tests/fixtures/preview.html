<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obsidian MDX – Preview Demo</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
    }
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 2rem;
      background: #1e1e1e;
      color: #d4d4d4;
      line-height: 1.6;
    }
    h1 { color: #ffffff; }
    code {
      background: #2d2d2d;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    .error { color: #f48771; white-space: pre-wrap; font-family: monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import * as runtime from 'react/jsx-runtime'
    import ReactDOM from 'react-dom/client'

    // Pre-compiled static MDX for demo and Lighthouse auditing
    const fn = new Function(`
      "use strict";
      const {Fragment: _Fragment, jsx: _jsx, jsxs: _jsxs} = arguments[0];
      function MDXContent() {
        return _jsxs(_Fragment, {
          children: [
            _jsx("h1", { children: "Obsidian MDX" }),
            _jsx("p", { children: "Preview MDX files directly inside Obsidian, with support for Code Hike." }),
            _jsxs("ul", {
              children: [
                _jsx("li", { children: "Sandboxed iframe rendering" }),
                _jsx("li", { children: "Code Hike syntax highlighting" }),
                _jsx("li", { children: "Security warning before execution" }),
              ]
            }),
            _jsxs("p", {
              children: [
                "Only ",
                _jsx("code", { children: ".mdx" }),
                " files are supported."
              ]
            })
          ]
        })
      }
      return { default: MDXContent };
    `)

    try {
      const { default: MDXContent } = fn({ ...runtime })
      ReactDOM.createRoot(document.getElementById('root')).render(MDXContent({}))
    } catch (err) {
      document.getElementById('root').innerHTML =
        '<pre class="error">Error: ' + String(err) + '</pre>'
    }
  </script>
</body>
</html>
